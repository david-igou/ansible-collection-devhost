---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Check podman is installed
      ansible.builtin.command:
        cmd: podman --version
      register: _podman
      changed_when: false

    - name: Check git is installed # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git --version
      register: _git
      changed_when: false

    - name: Check devcontainer CLI is installed
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/devcontainer --version"
      register: _devcontainer
      changed_when: false

    - name: Verify workspace directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/workspace"
      register: _workspace

    - name: Assert workspace directory
      ansible.builtin.assert:
        that:
          - _workspace.stat.exists
          - _workspace.stat.isdir
        fail_msg: "~/workspace directory does not exist"

    - name: Verify .claude directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.claude"
      register: _claude_dir

    - name: Assert .claude directory
      ansible.builtin.assert:
        that:
          - _claude_dir.stat.exists
          - _claude_dir.stat.isdir
        fail_msg: "~/.claude directory does not exist"

    - name: Verify gitconfig has user.name # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.name
      register: _git_name
      changed_when: false

    - name: Assert git user.name
      ansible.builtin.assert:
        that:
          - _git_name.stdout == "Test User"
        fail_msg: "git user.name not set correctly"

    - name: Verify gitconfig has user.email # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.email
      register: _git_email
      changed_when: false

    - name: Assert git user.email
      ansible.builtin.assert:
        that:
          - _git_email.stdout == "test@example.com"
        fail_msg: "git user.email not set correctly"

    - name: Verify SSH config exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.ssh/config"
      register: _ssh_config

    - name: Assert SSH config
      ansible.builtin.assert:
        that:
          - _ssh_config.stat.exists
          - _ssh_config.stat.mode == "0600"
        fail_msg: "~/.ssh/config does not exist or has wrong permissions"

    - name: Read SSH config content
      ansible.builtin.slurp:
        src: "{{ ansible_facts.env.HOME }}/.ssh/config"
      register: _ssh_config_content

    - name: Assert SSH config content
      ansible.builtin.assert:
        that:
          - "'StrictHostKeyChecking no' in (_ssh_config_content.content | b64decode)"
        fail_msg: "SSH config does not contain expected content"

    - name: Verify bashrc exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.bashrc"
      register: _bashrc

    - name: Assert bashrc
      ansible.builtin.assert:
        that:
          - _bashrc.stat.exists
          - _bashrc.stat.mode == "0644"
        fail_msg: "~/.bashrc does not exist or has wrong permissions"

    - name: Read bashrc content
      ansible.builtin.slurp:
        src: "{{ ansible_facts.env.HOME }}/.bashrc"
      register: _bashrc_content

    - name: Assert bashrc content
      ansible.builtin.assert:
        that:
          - "'export EDITOR=vim' in (_bashrc_content.content | b64decode)"
        fail_msg: "bashrc does not contain expected content"

    - name: Verify 1Password service account token exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.config/op/service-account-token"
      register: _op_token

    - name: Assert 1Password service account token
      ansible.builtin.assert:
        that:
          - _op_token.stat.exists
          - _op_token.stat.mode == "0600"
        fail_msg: "~/.config/op/service-account-token does not exist or has wrong permissions"

    - name: Read 1Password service account token content
      ansible.builtin.slurp:
        src: "{{ ansible_facts.env.HOME }}/.config/op/service-account-token"
      register: _op_token_content

    - name: Assert 1Password service account token content
      ansible.builtin.assert:
        that:
          - "(_op_token_content.content | b64decode) == 'test-token-value'"
        fail_msg: "1Password token does not match expected value"

    - name: Load packages role defaults
      ansible.builtin.include_vars:
        file: ../../../roles/packages/defaults/main.yml

    - name: Check Node.js version
      ansible.builtin.command:
        cmd: node --version
      register: _node
      changed_when: false

    - name: Assert Node.js version
      ansible.builtin.assert:
        that:
          - _node.stdout == packages_nodejs_version
        fail_msg: "Node.js version mismatch: got {{ _node.stdout }}, expected {{ packages_nodejs_version }}"

    - name: Check npm is available
      ansible.builtin.command:
        cmd: npm --version
      register: _npm
      changed_when: false

    - name: Assert npm is available
      ansible.builtin.assert:
        that:
          - _npm.rc == 0
        fail_msg: "npm is not installed"

    - name: Check ansible is installed
      ansible.builtin.command:
        cmd: ansible --version
      register: _ansible
      changed_when: false

    - name: Assert ansible is available
      ansible.builtin.assert:
        that:
          - _ansible.rc == 0
        fail_msg: "ansible is not installed"

    - name: Check molecule is installed
      ansible.builtin.command:
        cmd: molecule --version
      register: _molecule
      changed_when: false

    - name: Assert molecule is available
      ansible.builtin.assert:
        that:
          - _molecule.rc == 0
        fail_msg: "molecule is not installed"

    - name: Check yq is installed
      ansible.builtin.command:
        cmd: yq --version
      register: _yq
      changed_when: false

    - name: Assert yq is available
      ansible.builtin.assert:
        that:
          - _yq.rc == 0
        fail_msg: "yq is not installed"

    - name: Check vim is installed
      ansible.builtin.command:
        cmd: vim --version
      register: _vim
      changed_when: false

    - name: Assert vim is available
      ansible.builtin.assert:
        that:
          - _vim.rc == 0
        fail_msg: "vim is not installed"

    - name: Check tmux is installed
      ansible.builtin.command:
        cmd: tmux -V
      register: _tmux
      changed_when: false

    - name: Assert tmux is available
      ansible.builtin.assert:
        that:
          - _tmux.rc == 0
        fail_msg: "tmux is not installed"

    - name: Check nmap is installed
      ansible.builtin.command:
        cmd: nmap --version
      register: _nmap
      changed_when: false

    - name: Assert nmap is available
      ansible.builtin.assert:
        that:
          - _nmap.rc == 0
        fail_msg: "nmap is not installed"

    - name: Check rsync is installed # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: rsync --version
      register: _rsync
      changed_when: false

    - name: Assert rsync is available
      ansible.builtin.assert:
        that:
          - _rsync.rc == 0
        fail_msg: "rsync is not installed"

    - name: Check gpg is installed
      ansible.builtin.command:
        cmd: gpg --version
      register: _gpg
      changed_when: false

    - name: Assert gpg is available
      ansible.builtin.assert:
        that:
          - _gpg.rc == 0
        fail_msg: "gpg is not installed"

    - name: Check direnv is installed
      ansible.builtin.command:
        cmd: direnv version
      register: _direnv
      changed_when: false
      when: ansible_facts.os_family == "Debian"

    - name: Assert direnv is available
      ansible.builtin.assert:
        that:
          - _direnv.rc == 0
        fail_msg: "direnv is not installed"
      when: ansible_facts.os_family == "Debian"

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "podman: {{ _podman.stdout }}"
          - "git: {{ _git.stdout }}"
          - "devcontainer: {{ _devcontainer.stdout }}"
          - "workspace: {{ _workspace.stat.exists }}"
          - "git user.name: {{ _git_name.stdout }}"
          - "git user.email: {{ _git_email.stdout }}"
          - "ssh config: {{ _ssh_config.stat.exists }} (mode={{ _ssh_config.stat.mode }})"
          - "bashrc: {{ _bashrc.stat.exists }} (mode={{ _bashrc.stat.mode }})"
          - "op token: {{ _op_token.stat.exists }} (mode={{ _op_token.stat.mode }})"
          - "vim: {{ _vim.stdout_lines[0] }}"
          - "tmux: {{ _tmux.stdout }}"
          - "nmap: {{ _nmap.stdout_lines[0] }}"
          - "rsync: {{ _rsync.stdout_lines[0] }}"
          - "gpg: {{ _gpg.stdout_lines[0] }}"
          - "node: {{ _node.stdout }}"
          - "npm: {{ _npm.stdout }}"
          - "ansible: {{ _ansible.stdout_lines[0] }}"
          - "molecule: {{ _molecule.stdout_lines[0] }}"
          - "yq: {{ _yq.stdout }}"
