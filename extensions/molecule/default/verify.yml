---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Check podman is installed
      ansible.builtin.command:
        cmd: podman --version
      register: _podman
      changed_when: false

    - name: Check git is installed # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git --version
      register: _git
      changed_when: false

    - name: Check devcontainer CLI is installed
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/devcontainer --version"
      register: _devcontainer
      changed_when: false

    - name: Verify workspace directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/workspace"
      register: _workspace

    - name: Assert workspace directory
      ansible.builtin.assert:
        that:
          - _workspace.stat.exists
          - _workspace.stat.isdir
        fail_msg: "~/workspace directory does not exist"

    - name: Verify .claude directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.claude"
      register: _claude_dir

    - name: Assert .claude directory
      ansible.builtin.assert:
        that:
          - _claude_dir.stat.exists
          - _claude_dir.stat.isdir
        fail_msg: "~/.claude directory does not exist"

    - name: Verify gitconfig has user.name # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.name
      register: _git_name
      changed_when: false

    - name: Assert git user.name
      ansible.builtin.assert:
        that:
          - _git_name.stdout == "Test User"
        fail_msg: "git user.name not set correctly"

    - name: Verify gitconfig has user.email # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.email
      register: _git_email
      changed_when: false

    - name: Assert git user.email
      ansible.builtin.assert:
        that:
          - _git_email.stdout == "test@example.com"
        fail_msg: "git user.email not set correctly"

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "podman: {{ _podman.stdout }}"
          - "git: {{ _git.stdout }}"
          - "devcontainer: {{ _devcontainer.stdout }}"
          - "workspace: {{ _workspace.stat.exists }}"
          - "git user.name: {{ _git_name.stdout }}"
          - "git user.email: {{ _git_email.stdout }}"
