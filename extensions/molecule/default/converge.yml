    devhost_install_github_cli: false
    devhost_install_claude_code: false
    devhost_install_cursor_agent: false
    devhost_git_user_name: "Test User"
    devhost_git_user_email: "test@example.com"
    devhost_podman_socket_symlink: false

  roles:
    - role: david_igou.devhost.packages
    - role: david_igou.devhost.host_prep
    # - role: david_igou.devhost.podman_rootless
