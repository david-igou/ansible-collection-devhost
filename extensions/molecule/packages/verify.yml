---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Load packages role defaults
      ansible.builtin.include_vars:
        file: ../../../roles/packages/defaults/main.yml

    - name: Check git is installed # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git --version
      register: _git
      changed_when: false

    - name: Check devcontainer CLI is installed
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/devcontainer --version"
      register: _devcontainer
      changed_when: false

    - name: Check jq is installed
      ansible.builtin.command:
        cmd: jq --version
      register: _jq
      changed_when: false

    - name: Check make is installed
      ansible.builtin.command:
        cmd: make --version
      register: _make
      changed_when: false

    - name: Check kubectl is installed
      ansible.builtin.command:
        cmd: kubectl version --client -o json
      register: _kubectl
      changed_when: false

    - name: Assert kubectl version
      ansible.builtin.assert:
        that:
          - packages_kubectl_version in _kubectl.stdout
        fail_msg: "kubectl version mismatch: expected {{ packages_kubectl_version }}"

    - name: Check helm is installed
      ansible.builtin.command:
        cmd: helm version --short
      register: _helm
      changed_when: false

    - name: Assert helm version
      ansible.builtin.assert:
        that:
          - packages_helm_version in _helm.stdout
        fail_msg: "helm version mismatch: expected {{ packages_helm_version }}"

    - name: Check kustomize is installed
      ansible.builtin.command:
        cmd: kustomize version
      register: _kustomize
      changed_when: false

    - name: Assert kustomize version
      ansible.builtin.assert:
        that:
          - packages_kustomize_version in _kustomize.stdout
        fail_msg: "kustomize version mismatch: expected {{ packages_kustomize_version }}"

    - name: Check virtctl is installed
      ansible.builtin.command:
        cmd: virtctl version --client
      register: _virtctl
      changed_when: false

    - name: Assert virtctl version
      ansible.builtin.assert:
        that:
          - packages_virtctl_version in _virtctl.stdout
        fail_msg: "virtctl version mismatch: expected {{ packages_virtctl_version }}"

    - name: Check 1Password CLI version
      ansible.builtin.command:
        cmd: op --version
      register: _op
      changed_when: false

    - name: Assert 1Password CLI reports a version
      ansible.builtin.assert:
        that:
          - _op.stdout | length > 0
        fail_msg: "op did not return a version string"

    - name: Check GitHub CLI version
      ansible.builtin.command:
        cmd: gh --version
      register: _gh
      changed_when: false

    - name: Assert GitHub CLI reports a version
      ansible.builtin.assert:
        that:
          - _gh.stdout | length > 0
        fail_msg: "gh did not return a version string"

    - name: Check Claude Code CLI version
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/claude --version"
      register: _claude
      changed_when: false

    - name: Assert Claude Code reports a version
      ansible.builtin.assert:
        that:
          - _claude.stdout | length > 0
        fail_msg: "claude did not return a version string"

    - name: Check Cursor agent CLI version
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/agent --version"
      register: _cursor_agent
      changed_when: false

    - name: Assert Cursor agent reports a version
      ansible.builtin.assert:
        that:
          - _cursor_agent.stdout | length > 0
        fail_msg: "cursor-agent did not return a version string"

    - name: Check Node.js version
      ansible.builtin.command:
        cmd: node --version
      register: _node
      changed_when: false

    - name: Assert Node.js version
      ansible.builtin.assert:
        that:
          - _node.stdout == packages_nodejs_version
        fail_msg: "Node.js version mismatch: got {{ _node.stdout }}, expected {{ packages_nodejs_version }}"

    - name: Check npm is available
      ansible.builtin.command:
        cmd: npm --version
      register: _npm
      changed_when: false

    - name: Assert npm is available
      ansible.builtin.assert:
        that:
          - _npm.rc == 0
        fail_msg: "npm is not installed"

    - name: Check ansible is installed
      ansible.builtin.command:
        cmd: ansible --version
      register: _ansible
      changed_when: false

    - name: Assert ansible is available
      ansible.builtin.assert:
        that:
          - _ansible.rc == 0
        fail_msg: "ansible is not installed"

    - name: Check molecule is installed
      ansible.builtin.command:
        cmd: molecule --version
      register: _molecule
      changed_when: false

    - name: Assert molecule is available
      ansible.builtin.assert:
        that:
          - _molecule.rc == 0
        fail_msg: "molecule is not installed"

    - name: Check yq is installed
      ansible.builtin.command:
        cmd: yq --version
      register: _yq
      changed_when: false

    - name: Assert yq is available
      ansible.builtin.assert:
        that:
          - _yq.rc == 0
        fail_msg: "yq is not installed"

    - name: Check vim is installed
      ansible.builtin.command:
        cmd: vim --version
      register: _vim
      changed_when: false

    - name: Assert vim is available
      ansible.builtin.assert:
        that:
          - _vim.rc == 0
        fail_msg: "vim is not installed"

    - name: Check tmux is installed
      ansible.builtin.command:
        cmd: tmux -V
      register: _tmux
      changed_when: false

    - name: Assert tmux is available
      ansible.builtin.assert:
        that:
          - _tmux.rc == 0
        fail_msg: "tmux is not installed"

    - name: Check nmap is installed
      ansible.builtin.command:
        cmd: nmap --version
      register: _nmap
      changed_when: false

    - name: Assert nmap is available
      ansible.builtin.assert:
        that:
          - _nmap.rc == 0
        fail_msg: "nmap is not installed"

    - name: Check rsync is installed # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: rsync --version
      register: _rsync
      changed_when: false

    - name: Assert rsync is available
      ansible.builtin.assert:
        that:
          - _rsync.rc == 0
        fail_msg: "rsync is not installed"

    - name: Check gpg is installed
      ansible.builtin.command:
        cmd: gpg --version
      register: _gpg
      changed_when: false

    - name: Assert gpg is available
      ansible.builtin.assert:
        that:
          - _gpg.rc == 0
        fail_msg: "gpg is not installed"

    - name: Check direnv is installed
      ansible.builtin.command:
        cmd: direnv version
      register: _direnv
      changed_when: false
      when: ansible_facts.os_family == "Debian"

    - name: Assert direnv is available
      ansible.builtin.assert:
        that:
          - _direnv.rc == 0
        fail_msg: "direnv is not installed"
      when: ansible_facts.os_family == "Debian"

    - name: Check argocd is installed
      ansible.builtin.command:
        cmd: argocd version --client --short
      register: _argocd
      changed_when: false

    - name: Assert argocd version
      ansible.builtin.assert:
        that:
          - (packages_argocd_version | regex_replace('^v', '')) in _argocd.stdout
        fail_msg: "argocd version mismatch: expected {{ packages_argocd_version }}"

    - name: Check flux is installed
      ansible.builtin.command:
        cmd: flux version --client
      register: _flux
      changed_when: false

    - name: Assert flux version
      ansible.builtin.assert:
        that:
          - (packages_flux_version | regex_replace('^v', '')) in _flux.stdout
        fail_msg: "flux version mismatch: expected {{ packages_flux_version }}"

    - name: Check kubeseal is installed
      ansible.builtin.command:
        cmd: kubeseal --version
      register: _kubeseal
      changed_when: false

    - name: Assert kubeseal version
      ansible.builtin.assert:
        that:
          - (packages_kubeseal_version | regex_replace('^v', '')) in _kubeseal.stdout
        fail_msg: "kubeseal version mismatch: expected {{ packages_kubeseal_version }}"

    - name: Check tkn is installed
      ansible.builtin.command:
        cmd: tkn version
      register: _tkn
      changed_when: false

    - name: Assert tkn version
      ansible.builtin.assert:
        that:
          - (packages_tkn_version | regex_replace('^v', '')) in _tkn.stdout
        fail_msg: "tkn version mismatch: expected {{ packages_tkn_version }}"

    - name: Check terraform is installed
      ansible.builtin.command:
        cmd: terraform version
      register: _terraform
      changed_when: false

    - name: Assert terraform version
      ansible.builtin.assert:
        that:
          - (packages_terraform_version | regex_replace('^v', '')) in _terraform.stdout
        fail_msg: "terraform version mismatch: expected {{ packages_terraform_version }}"

    - name: Check sops is installed
      ansible.builtin.command:
        cmd: sops --version
      register: _sops
      changed_when: false

    - name: Assert sops version
      ansible.builtin.assert:
        that:
          - (packages_sops_version | regex_replace('^v', '')) in _sops.stdout
        fail_msg: "sops version mismatch: expected {{ packages_sops_version }}"

    - name: Check oc is installed
      ansible.builtin.command:
        cmd: oc version --client
      register: _oc
      changed_when: false

    - name: Assert oc reports a version
      ansible.builtin.assert:
        that:
          - _oc.stdout | length > 0
        fail_msg: "oc did not return a version string"

    - name: Check kubeconform is installed
      ansible.builtin.command:
        cmd: kubeconform -v
      register: _kubeconform
      changed_when: false

    - name: Assert kubeconform version
      ansible.builtin.assert:
        that:
          - (packages_kubeconform_version | regex_replace('^v', '')) in _kubeconform.stdout
        fail_msg: "kubeconform version mismatch: expected {{ packages_kubeconform_version }}"

    - name: Check kube-burner is installed
      ansible.builtin.command:
        cmd: kube-burner version
      register: _kube_burner
      changed_when: false

    - name: Assert kube-burner version
      ansible.builtin.assert:
        that:
          - (packages_kube_burner_version | regex_replace('^v', '')) in _kube_burner.stdout
        fail_msg: "kube-burner version mismatch: expected {{ packages_kube_burner_version }}"

    - name: Check kube-burner-ocp is installed
      ansible.builtin.command:
        cmd: kube-burner-ocp version
      register: _kube_burner_ocp
      changed_when: false

    - name: Assert kube-burner-ocp version
      ansible.builtin.assert:
        that:
          - (packages_kube_burner_ocp_version | regex_replace('^v', '')) in _kube_burner_ocp.stdout
        fail_msg: "kube-burner-ocp version mismatch: expected {{ packages_kube_burner_ocp_version }}"

    - name: Check act is installed
      ansible.builtin.command:
        cmd: act --version
      register: _act
      changed_when: false

    - name: Assert act version
      ansible.builtin.assert:
        that:
          - (packages_act_version | regex_replace('^v', '')) in _act.stdout
        fail_msg: "act version mismatch: expected {{ packages_act_version }}"

    - name: Check mc is installed
      ansible.builtin.command:
        cmd: mc --version
      register: _mc
      changed_when: false

    - name: Assert mc reports a version
      ansible.builtin.assert:
        that:
          - _mc.stdout | length > 0
        fail_msg: "mc did not return a version string"

    - name: Check rclone is installed
      ansible.builtin.command:
        cmd: rclone version
      register: _rclone
      changed_when: false

    - name: Assert rclone version
      ansible.builtin.assert:
        that:
          - (packages_rclone_version | regex_replace('^v', '')) in _rclone.stdout
        fail_msg: "rclone version mismatch: expected {{ packages_rclone_version }}"

    # -- Docker CE CLI --

    - name: Check docker CLI version
      ansible.builtin.command:
        cmd: docker --version
      register: _docker
      changed_when: false

    - name: Assert docker CLI is Docker CE (not podman)
      ansible.builtin.assert:
        that:
          - "'Docker' in _docker.stdout"
          - "'podman' not in _docker.stdout"
        fail_msg: >-
          docker --version output does not indicate Docker CE.
          Got: {{ _docker.stdout }}

    - name: Check docker compose version
      ansible.builtin.command:
        cmd: docker compose version
      register: _docker_compose
      changed_when: false

    - name: Assert docker compose plugin is installed
      ansible.builtin.assert:
        that:
          - _docker_compose.rc == 0
        fail_msg: "docker compose plugin is not installed"

    - name: Verify podman-docker is not installed (Debian) # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: dpkg -l podman-docker
      register: _podman_docker_deb
      changed_when: false
      failed_when: false
      when: ansible_facts.os_family == "Debian"

    - name: Assert podman-docker is absent (Debian)
      ansible.builtin.assert:
        that:
          - _podman_docker_deb.rc != 0
        fail_msg: "podman-docker is still installed"
      when: ansible_facts.os_family == "Debian"

    - name: Verify podman-docker is not installed (RedHat) # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: rpm -q podman-docker
      register: _podman_docker_rpm
      changed_when: false
      failed_when: false
      when: ansible_facts.os_family == "RedHat"

    - name: Assert podman-docker is absent (RedHat)
      ansible.builtin.assert:
        that:
          - _podman_docker_rpm.rc != 0
        fail_msg: "podman-docker is still installed"
      when: ansible_facts.os_family == "RedHat"

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "git: {{ _git.stdout }}"
          - "devcontainer: {{ _devcontainer.stdout }}"
          - "jq: {{ _jq.stdout }}"
          - "make: {{ _make.stdout_lines[0] }}"
          - "kubectl: {{ (_kubectl.stdout | from_json).clientVersion.gitVersion }}"
          - "helm: {{ _helm.stdout }}"
          - "kustomize: {{ _kustomize.stdout }}"
          - "virtctl: {{ _virtctl.stdout_lines[0] }}"
          - "argocd: {{ _argocd.stdout }}"
          - "flux: {{ _flux.stdout_lines[0] }}"
          - "kubeseal: {{ _kubeseal.stdout }}"
          - "tkn: {{ _tkn.stdout_lines[0] }}"
          - "terraform: {{ _terraform.stdout_lines[0] }}"
          - "sops: {{ _sops.stdout }}"
          - "oc: {{ _oc.stdout_lines[0] }}"
          - "kubeconform: {{ _kubeconform.stdout }}"
          - "kube-burner: {{ _kube_burner.stdout_lines[0] }}"
          - "kube-burner-ocp: {{ _kube_burner_ocp.stdout_lines[0] }}"
          - "act: {{ _act.stdout }}"
          - "mc: {{ _mc.stdout_lines[0] }}"
          - "rclone: {{ _rclone.stdout_lines[0] }}"
          - "op: {{ _op.stdout }}"
          - "gh: {{ _gh.stdout_lines[0] }}"
          - "claude: {{ _claude.stdout }}"
          - "agent: {{ _cursor_agent.stdout }}"
          - "vim: {{ _vim.stdout_lines[0] }}"
          - "tmux: {{ _tmux.stdout }}"
          - "nmap: {{ _nmap.stdout_lines[0] }}"
          - "rsync: {{ _rsync.stdout_lines[0] }}"
          - "gpg: {{ _gpg.stdout_lines[0] }}"
          - "node: {{ _node.stdout }}"
          - "npm: {{ _npm.stdout }}"
          - "ansible: {{ _ansible.stdout_lines[0] }}"
          - "molecule: {{ _molecule.stdout_lines[0] }}"
          - "yq: {{ _yq.stdout }}"
