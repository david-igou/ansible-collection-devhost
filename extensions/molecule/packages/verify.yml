---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  vars:
    # The mise-managed tool set is verified dynamically from the fetched mise.toml
    # (via `mise ls` + `mise bin-paths`), so it tracks igou-devenv automatically
    # instead of a hand-synced list. Only the non-mise CLIs (distro/pip/npm) are
    # enumerated explicitly here.
    _packages_nonmise_cli:
      - git
      - jq
      - make
      - gpg
      - op
      - ansible
      - molecule
      - yq
      - vim
      - tmux
      - nmap
      - rsync
    _packages_mise_env:
      MISE_GLOBAL_CONFIG_FILE: /etc/mise/mise.toml
      MISE_DATA_DIR: /opt/mise
      MISE_TRUSTED_CONFIG_PATHS: /etc/mise/mise.toml

  tasks:
    - name: Query mise for any pinned tool that is not installed
      ansible.builtin.command:
        cmd: /usr/local/bin/mise ls --missing
      environment: "{{ _packages_mise_env }}"
      register: _mise_missing
      changed_when: false

    - name: Assert every pinned mise tool is installed at its locked version
      ansible.builtin.assert:
        that:
          - _mise_missing.stdout | trim | length == 0
        fail_msg: "mise reports tools not installed at their pinned version:\n{{ _mise_missing.stdout }}"
        success_msg: "all pinned mise tools are installed at their locked versions"

    - name: Assert every mise-managed binary is symlinked into /usr/local/bin # noqa: command-instead-of-shell -- bin-paths pipe + loop
      ansible.builtin.shell:
        executable: /usr/bin/bash
        cmd: |
          set -euo pipefail
          missing=""
          for d in $(/usr/local/bin/mise bin-paths 2>/dev/null); do
            while IFS= read -r f; do
              b="$(basename "$f")"
              [ -e "/usr/local/bin/$b" ] || missing="$missing $b"
            done < <(find -L "$d" -maxdepth 1 -type f -executable)
          done
          if [ -n "$missing" ]; then echo "NOT symlinked into /usr/local/bin:$missing"; exit 1; fi
          echo "all mise binaries symlinked into /usr/local/bin"
      environment: "{{ _packages_mise_env }}"
      register: _mise_symlinks
      changed_when: false

    - name: Check the non-mise CLIs resolve on PATH # noqa: command-instead-of-shell -- command -v is a shell builtin
      ansible.builtin.shell: "command -v {{ item }}"
      register: _nonmise
      changed_when: false
      failed_when: _nonmise.rc != 0
      loop: "{{ _packages_nonmise_cli }}"
      loop_control:
        label: "{{ item }}"

    - name: Check the ~/.local/bin agent CLIs report a version
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.local/bin/{{ item }} --version"
      register: _local_cli
      changed_when: false
      failed_when: false
      loop:
        - devcontainer
        - claude
        - agent
      loop_control:
        label: "{{ item }}"

    - name: Assert every ~/.local/bin CLI returned a version
      ansible.builtin.assert:
        that:
          - item.rc == 0
          - item.stdout | length > 0
        fail_msg: "{{ item.item }} did not return a version"
      loop: "{{ _local_cli.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "{{ _mise_symlinks.stdout }}"
          - "all pinned mise tools installed at their locked versions"
          - "{{ _packages_nonmise_cli | length }} non-mise CLIs resolve on PATH"
          - "devcontainer/claude/agent report versions"
