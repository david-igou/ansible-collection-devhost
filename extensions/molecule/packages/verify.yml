---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  vars:
    # mise-managed CLIs (from igou-devenv's mise.toml) that the role symlinks into
    # /usr/local/bin, plus the distro/pip/npm CLIs — all should resolve on PATH.
    _packages_cli_on_path:
      - kubectl
      - helm
      - kustomize
      - oc
      - virtctl
      - argocd
      - flux
      - sops
      - kubeconform
      - terraform
      - node
      - npm
      - kube-burner
      - act
      - rclone
      - tkn
      - gh
      - kind
      - direnv
      - age
      - git
      - jq
      - make
      - gpg
      - op
      - ansible
      - molecule
      - yq
      - vim
      - tmux
      - nmap
      - rsync

  tasks:
    - name: Check each CLI resolves on PATH # noqa: command-instead-of-shell -- command -v is a shell builtin
      ansible.builtin.shell: "command -v {{ item }}"
      register: _cli
      changed_when: false
      loop: "{{ _packages_cli_on_path }}"
      loop_control:
        label: "{{ item }}"

    - name: Check the ~/.local/bin agent CLIs are installed
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.local/bin/{{ item }}"
      register: _local_cli
      loop:
        - devcontainer
        - claude
        - agent

    - name: Assert every ~/.local/bin CLI exists
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "{{ item.item }} not found in ~/.local/bin"
      loop: "{{ _local_cli.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Print verification summary
      ansible.builtin.debug:
        msg: >-
          {{ _packages_cli_on_path | length }} CLIs resolve on PATH;
          devcontainer/claude/agent present in ~/.local/bin.
