---
dependency:
  name: galaxy
  options:
    requirements-file: extensions/molecule/provisioners/${PROVISIONER:-podman}/requirements.yml
    force: true
driver:
  name: default
  options:
    managed: true
    ansible_connection_options:
      connection: local
platforms:
  - name: ubuntu-24
    podman:
      image: docker.io/geerlingguy/docker-ubuntu2404-ansible:latest
      command: sleep 1d
    kubevirt:
      image: quay.io/containerdisks/ubuntu:24.04
      namespace: ${MOLECULE_NAMESPACE:-molecule}
      ssh_service:
        type: NodePort
      ansible_user: cloud-user
      memory: 4Gi
      disk_size: 30Gi
  - name: centos-stream-10
    podman:
      image: quay.io/centos/centos:stream10
      command: sleep 1d
    kubevirt:
      image: quay.io/containerdisks/centos-stream:10
      namespace: ${MOLECULE_NAMESPACE:-molecule}
      ssh_service:
        type: NodePort
      ansible_user: cloud-user
      memory: 4Gi
      disk_size: 30Gi
  - name: fedora
    podman:
      image: docker.io/geerlingguy/docker-fedora43-ansible:latest
      command: sleep 1d
    kubevirt:
      image: quay.io/containerdisks/fedora:latest
      namespace: ${MOLECULE_NAMESPACE:-molecule}
      ssh_service:
        type: NodePort
      ansible_user: cloud-user
      memory: 4Gi
      disk_size: 30Gi
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    create: ../provisioners/${PROVISIONER:-podman}/create.yml
    destroy: ../provisioners/${PROVISIONER:-podman}/destroy.yml
    prepare: ../provisioners/${PROVISIONER:-podman}/prepare.yml
    verify: verify.yml
  inventory:
    links:
      group_vars: ../provisioners/${PROVISIONER:-podman}/group_vars/
verifier:
  name: ansible
scenario:
  name: packages
  # NOTE: `idempotence` is intentionally omitted. The pinned Python toolchain is
  # installed with `pip --ignore-installed` (required on PEP668/externally-managed
  # distros like Debian, where deps such as pathspec are apt-provided without RECORD
  # files), which is inherently non-idempotent. Making the pip layer idempotent
  # would require moving it into a virtualenv (a separate change to the operator's
  # toolchain install). The mise layer itself IS idempotent.
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
