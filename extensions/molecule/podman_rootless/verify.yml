---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Load podman_rootless role defaults
      ansible.builtin.include_vars:
        file: ../../../roles/podman_rootless/defaults/main.yml

    # -- Kernel tuning --

    - name: Read user.max_user_namespaces sysctl
      ansible.builtin.command:
        cmd: sysctl -n user.max_user_namespaces
      register: _userns
      changed_when: false

    - name: Assert user.max_user_namespaces matches expected value
      ansible.builtin.assert:
        that:
          - _userns.stdout | int == podman_rootless_user_namespaces_max | int
        fail_msg: >-
          user.max_user_namespaces is {{ _userns.stdout }},
          expected {{ podman_rootless_user_namespaces_max }}

    - name: Read net.ipv4.ip_unprivileged_port_start sysctl
      ansible.builtin.command:
        cmd: sysctl -n net.ipv4.ip_unprivileged_port_start
      register: _portstart
      changed_when: false

    - name: Assert unprivileged port start matches expected value
      ansible.builtin.assert:
        that:
          - _portstart.stdout | int == podman_rootless_unprivileged_port_start | int
        fail_msg: >-
          net.ipv4.ip_unprivileged_port_start is {{ _portstart.stdout }},
          expected {{ podman_rootless_unprivileged_port_start }}

    # -- Subordinate UID/GID mappings --

    - name: Read subuid file
      ansible.builtin.slurp:
        src: /etc/subuid
      register: _subuid_raw
      become: true

    - name: Assert subuid range is configured correctly
      vars:
        __expected_start: "{{ podman_rootless_subuid_start }}"
        __expected_count: "{{ podman_rootless_subuid_count }}"
        __subuid_content: "{{ _subuid_raw.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - ansible_facts.user_id in __subuid_content
          - __expected_start | string in __subuid_content
        fail_msg: >-
          subuid not configured for {{ ansible_facts.user_id }}
          with start={{ __expected_start }} count={{ __expected_count }}.
          Content: {{ __subuid_content }}

    - name: Read subgid file
      ansible.builtin.slurp:
        src: /etc/subgid
      register: _subgid_raw
      become: true

    - name: Assert subgid range is configured correctly
      vars:
        __expected_start: "{{ podman_rootless_subuid_start }}"
        __expected_count: "{{ podman_rootless_subuid_count }}"
        __subgid_content: "{{ _subgid_raw.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - ansible_facts.user_id in __subgid_content
          - __expected_start | string in __subgid_content
        fail_msg: >-
          subgid not configured for {{ ansible_facts.user_id }}
          with start={{ __expected_start }} count={{ __expected_count }}.
          Content: {{ __subgid_content }}

    # -- Lingering --

    - name: Check lingering is enabled
      ansible.builtin.stat:
        path: "/var/lib/systemd/linger/{{ ansible_facts.user_id }}"
      register: _linger

    - name: Assert lingering is enabled
      ansible.builtin.assert:
        that:
          - _linger.stat.exists
        fail_msg: "Lingering not enabled for {{ ansible_facts.user_id }}"

    # -- Containers configuration --

    - name: Stat containers config directory
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.config/containers"
      register: _containers_dir

    - name: Assert containers config directory exists with correct mode
      ansible.builtin.assert:
        that:
          - _containers_dir.stat.exists
          - _containers_dir.stat.isdir
          - _containers_dir.stat.mode == "0755"
        fail_msg: "~/.config/containers directory missing or wrong permissions"

    - name: Read containers.conf content
      ansible.builtin.slurp:
        src: "{{ ansible_facts.env.HOME }}/.config/containers/containers.conf"
      register: _containers_conf_raw

    - name: Assert containers.conf has expected events_logger setting
      vars:
        __conf_content: "{{ _containers_conf_raw.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'events_logger' in __conf_content"
          - >-
            'events_logger = "' + podman_rootless_events_logger + '"'
            in __conf_content
        fail_msg: >-
          containers.conf does not contain
          events_logger = "{{ podman_rootless_events_logger }}".
          Content: {{ __conf_content }}

    # -- Podman socket --

    - name: Check podman socket unit is enabled # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl --user is-enabled podman.socket
      register: _socket_enabled
      changed_when: false

    - name: Assert podman socket unit is enabled
      ansible.builtin.assert:
        that:
          - _socket_enabled.stdout == "enabled"
        fail_msg: "podman.socket is {{ _socket_enabled.stdout }}, expected enabled"

    - name: Stat podman socket file
      ansible.builtin.stat:
        path: "/run/user/{{ ansible_facts.user_uid }}/podman/podman.sock"
      register: _socket_file

    - name: Assert podman socket file exists
      ansible.builtin.assert:
        that:
          - _socket_file.stat.exists
          - _socket_file.stat.issock
        fail_msg: >-
          Podman socket not found at
          /run/user/{{ ansible_facts.user_uid }}/podman/podman.sock

    - name: Query podman API via socket # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          curl --silent --unix-socket
          /run/user/{{ ansible_facts.user_uid }}/podman/podman.sock
          http://d/v5.0.0/libpod/info
      register: _api_response
      changed_when: false

    - name: Assert podman API responds with valid JSON
      vars:
        __api_json: "{{ _api_response.stdout | from_json }}"
      ansible.builtin.assert:
        that:
          - __api_json.host is defined
          - __api_json.host.security is defined
        fail_msg: "Podman API did not return expected JSON structure"

    # -- Docker compatibility --

    - name: Stat docker.sock symlink
      ansible.builtin.stat:
        path: /var/run/docker.sock
      register: _docker_sock

    - name: Assert docker.sock symlink points to podman socket
      ansible.builtin.assert:
        that:
          - _docker_sock.stat.exists
          - _docker_sock.stat.islnk
          - >-
            _docker_sock.stat.lnk_source ==
            "/run/user/" + (ansible_facts.user_uid | string) + "/podman/podman.sock"
        fail_msg: >-
          /var/run/docker.sock is not a symlink to the podman socket.
          exists={{ _docker_sock.stat.exists }},
          islnk={{ _docker_sock.stat.islnk | default(false) }},
          target={{ _docker_sock.stat.lnk_source | default('N/A') }}

    # -- Storage driver --

    - name: Check podman storage driver
      ansible.builtin.command:
        cmd: podman info --format '{{ '{{' }}.Store.GraphDriverName{{ '}}' }}'
      register: _driver
      changed_when: false

    - name: Assert storage driver is overlay
      ansible.builtin.assert:
        that:
          - _driver.stdout == "overlay"
        fail_msg: "Storage driver is {{ _driver.stdout }}, expected overlay"

    # -- Rootless verification --

    - name: Check podman is running rootless
      ansible.builtin.command:
        cmd: podman info --format '{{ '{{' }}.Host.Security.Rootless{{ '}}' }}'
      register: _rootless
      changed_when: false

    - name: Assert podman reports rootless mode
      ansible.builtin.assert:
        that:
          - _rootless.stdout == "true"
        fail_msg: "Podman reports rootless={{ _rootless.stdout }}, expected true"

    - name: Verify user namespace mapping works
      ansible.builtin.command:
        cmd: podman unshare cat /proc/self/uid_map
      register: _uid_map
      changed_when: false

    - name: Assert user namespace provides subordinate UIDs
      ansible.builtin.assert:
        that:
          - _uid_map.rc == 0
          - _uid_map.stdout_lines | length > 1
        fail_msg: >-
          User namespace uid_map has {{ _uid_map.stdout_lines | length }} entries,
          expected more than 1. Content: {{ _uid_map.stdout }}

    # -- End-to-end container lifecycle --

    - name: Pull alpine image
      ansible.builtin.command:
        cmd: podman pull --quiet docker.io/library/alpine:latest
      register: _pull
      changed_when: false

    - name: Assert pull succeeded
      ansible.builtin.assert:
        that:
          - _pull.rc == 0
        fail_msg: "podman pull failed: {{ _pull.stderr }}"

    - name: Run a rootless container
      ansible.builtin.command:
        cmd: podman run --rm docker.io/library/alpine:latest echo hello-from-rootless
      register: _run
      changed_when: false

    - name: Assert container ran and produced expected output
      ansible.builtin.assert:
        that:
          - _run.rc == 0
          - _run.stdout == "hello-from-rootless"
        fail_msg: "Container output was '{{ _run.stdout }}', expected 'hello-from-rootless'"

    - name: Run a container with a volume mount
      ansible.builtin.command:
        cmd: >-
          podman run --rm
          -v {{ ansible_facts.env.HOME }}/.config/containers:/host:ro
          docker.io/library/alpine:latest
          cat /host/containers.conf
      register: _volume_run
      changed_when: false

    - name: Assert volume mount worked
      ansible.builtin.assert:
        that:
          - _volume_run.rc == 0
          - "'events_logger' in _volume_run.stdout"
        fail_msg: "Volume mount failed: {{ _volume_run.stderr }}"

    - name: Clean up pulled images
      ansible.builtin.command:
        cmd: podman rmi --all --force
      register: _cleanup
      changed_when: _cleanup.stdout | length > 0

    # -- Summary --

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "user.max_user_namespaces: {{ _userns.stdout }}"
          - "net.ipv4.ip_unprivileged_port_start: {{ _portstart.stdout }}"
          - "subuid configured: {{ ansible_facts.user_id in (_subuid_raw.content | b64decode) }}"
          - "subgid configured: {{ ansible_facts.user_id in (_subgid_raw.content | b64decode) }}"
          - "lingering: {{ _linger.stat.exists }}"
          - "containers.conf: present"
          - "podman.socket: {{ _socket_enabled.stdout }}"
          - "socket file: {{ _socket_file.stat.exists }}"
          - "API responsive: {{ (_api_response.stdout | from_json).host is defined }}"
          - "docker.sock symlink: {{ _docker_sock.stat.islnk | default(false) }}"
          - "storage driver: {{ _driver.stdout }}"
          - "rootless mode: {{ _rootless.stdout }}"
          - "user namespace entries: {{ _uid_map.stdout_lines | length }}"
          - "container run: {{ _run.stdout }}"
          - "volume mount: passed"
