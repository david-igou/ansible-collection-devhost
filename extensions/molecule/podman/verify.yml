---
- name: Verify
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Check podman CLI version
      ansible.builtin.command:
        cmd: podman --version
      register: _podman_version
      changed_when: false

    - name: Assert podman binary is installed
      ansible.builtin.assert:
        that:
          - _podman_version.rc == 0
          - "'podman version' in _podman_version.stdout"
        fail_msg: >-
          podman --version failed or returned unexpected output.
          Got: {{ _podman_version.stdout | default('') }}

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "podman version: {{ _podman_version.stdout }}"
