---
- name: Converge
  hosts: all
  gather_facts: true
  become: false

  vars:
    podman_rootless: false
    podman_docker_compat: false
    podman_docker_socket_symlink: false
    podman_configure_containers_conf: false
    podman_configure_storage_conf: false
    podman_enable_linger: false

  roles:
    - role: david_igou.devhost.podman
