---
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Delete VM instance in KubeVirt
      kubernetes.core.k8s:
        state: absent
        kind: VirtualMachine
        name: "{{ vm.name }}"
        namespace: "{{ vm.kubevirt.namespace }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        loop_var: vm

    - name: Delete NodePort service in KubeVirt
      kubernetes.core.k8s:
        state: absent
        kind: Service
        name: "{{ vm.name }}"
        namespace: "{{ vm.kubevirt.namespace }}"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        loop_var: vm
