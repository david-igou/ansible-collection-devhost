---
- name: Prepare podman instances
  hosts: all
  gather_facts: false

  tasks:
    - name: Bootstrap Python and sudo on Debian-based hosts
      ansible.builtin.raw: >-
        /bin/sh -c
        'test -f /usr/bin/apt-get
        && apt-get update -qq
        && apt-get install -y -qq python3 python3-apt sudo
        || true'
      changed_when: true

    - name: Bootstrap sudo on RedHat-based hosts
      ansible.builtin.raw: >-
        /bin/sh -c
        'test -f /usr/bin/dnf
        && dnf install -y -q sudo
        || true'
      changed_when: true
