---
- name: Verify
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Verify workspace directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/workspace"
      register: _workspace

    - name: Assert workspace directory
      ansible.builtin.assert:
        that:
          - _workspace.stat.exists
          - _workspace.stat.isdir
        fail_msg: "~/workspace directory does not exist"

    - name: Verify .claude directory exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.claude"
      register: _claude_dir

    - name: Assert .claude directory
      ansible.builtin.assert:
        that:
          - _claude_dir.stat.exists
          - _claude_dir.stat.isdir
        fail_msg: "~/.claude directory does not exist"

    - name: Verify .claude.json exists
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.claude.json"
      register: _claude_json

    - name: Assert .claude.json
      ansible.builtin.assert:
        that:
          - _claude_json.stat.exists
          - not _claude_json.stat.isdir
        fail_msg: "~/.claude.json does not exist"

    - name: Verify gitconfig has user.name # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.name
      register: _git_name
      changed_when: false

    - name: Assert git user.name
      ansible.builtin.assert:
        that:
          - _git_name.stdout == "Test User"
        fail_msg: "git user.name not set correctly"

    - name: Verify gitconfig has user.email # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global user.email
      register: _git_email
      changed_when: false

    - name: Assert git user.email
      ansible.builtin.assert:
        that:
          - _git_email.stdout == "test@example.com"
        fail_msg: "git user.email not set correctly"

    - name: Verify GitHub SSH URL rewrite # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git config --global --get url.git@github.com:.insteadOf
      register: _git_ssh_rewrite
      changed_when: false

    - name: Assert GitHub SSH URL rewrite
      ansible.builtin.assert:
        that:
          - _git_ssh_rewrite.stdout == "https://github.com/"
        fail_msg: "GitHub SSH URL rewrite not configured"

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "workspace dir: {{ _workspace.stat.exists }}"
          - ".claude dir: {{ _claude_dir.stat.exists }}"
          - ".claude.json: {{ _claude_json.stat.exists }}"
          - "git user.name: {{ _git_name.stdout }}"
          - "git user.email: {{ _git_email.stdout }}"
          - "git ssh rewrite: {{ _git_ssh_rewrite.stdout }}"
