---
- name: Converge
  hosts: all
  gather_facts: true
  become: false

  vars:
    host_prep_git_user_name: "Test User"
    host_prep_git_user_email: "test@example.com"
    host_prep_ssh_config: |
      Host *
        StrictHostKeyChecking no
    host_prep_bashrc: |
      # Test bashrc
      export EDITOR=vim
    host_prep_onepassword_service_account_token: "test-token-value"
    host_prep_devcontainer_repository: ""
    host_prep_workspace_repositories: []

  roles:
    - role: david_igou.devhost.host_prep

  pre_tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      become: true
      when: ansible_facts.os_family == "Debian"

    - name: Ensure git package is installed
      ansible.builtin.package:
        name: git
        state: present
