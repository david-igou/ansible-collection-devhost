---
- name: Converge
  hosts: all
  gather_facts: true
  become: false

  vars:
    packages_install_onepassword: true
    packages_install_github_cli: false
    packages_install_claude_code: true
    packages_install_cursor_agent: true
    packages_install_kubectl: false
    packages_install_helm: false
    packages_install_kustomize: false
    packages_install_virtctl: false
    packages_install_pip_packages: false
    packages_install_nodejs_pinned: false
    packages_install_extra_packages: false
    host_prep_git_github_ssh_rewrite: false
    host_prep_git_user_name: "Test User"
    host_prep_git_user_email: "test@example.com"
    host_prep_ssh_config: |
      Host *
        StrictHostKeyChecking no
    host_prep_bashrc: |
      # Test bashrc
      export EDITOR=vim
    host_prep_onepassword_service_account_token: "test-token-value"
    host_prep_devcontainer_repository: "https://github.com/igou-io/igou-devenv.git"
    host_prep_workspace_repositories:
      - "https://github.com/igou-io/igou-ansible.git"
      - "https://github.com/igou-io/igou-openshift.git"
      - "https://github.com/igou-io/igou-containers.git"
    podman_docker_compat: false
    podman_docker_socket_symlink: false
    podman_configure_storage_conf: true

  pre_tasks:
    - name: Wait for cloud-init to finish
      ansible.builtin.command:
        cmd: cloud-init status --wait
      changed_when: false
      become: true
      failed_when: false

  roles:
    - role: david_igou.devhost.packages
    - role: david_igou.devhost.host_prep
    - role: david_igou.devhost.podman
    - role: david_igou.devhost.docker
