---
- name: Converge
  hosts: all
  gather_facts: true
  become: false

  vars:
    docker_install_daemon: false
    docker_rootless: false

  pre_tasks:
    - name: Install gnupg for Docker CE GPG key import
      ansible.builtin.apt:
        name: gnupg
        state: present
        update_cache: true
      become: true
      when: ansible_facts.os_family == "Debian"

  roles:
    - role: david_igou.devhost.docker
