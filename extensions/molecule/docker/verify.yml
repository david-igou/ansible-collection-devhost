---
- name: Verify
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Check docker CLI version
      ansible.builtin.command:
        cmd: docker --version
      register: _docker_version
      changed_when: false

    - name: Assert docker binary is installed
      ansible.builtin.assert:
        that:
          - _docker_version.rc == 0
          - "'Docker' in _docker_version.stdout"
        fail_msg: >-
          docker --version failed or returned unexpected output.
          Got: {{ _docker_version.stdout | default('') }}

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "docker version: {{ _docker_version.stdout }}"
