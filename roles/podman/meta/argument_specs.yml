---
argument_specs:
  main:
    short_description: Configure Podman for the target user
    description:
      - Tunes kernel parameters for rootless containers.
      - Configures subuid/subgid mappings.
      - Enables lingering so user services survive logout.
      - Deploys user-level containers.conf and storage.conf.
      - Activates the podman socket in user scope.
      - Optionally symlinks docker.sock to the podman socket.
    options:
      podman_rootless:
        type: bool
        default: true
        description: >-
          Gate for rootless-specific tasks (sysctl, subuid/subgid, linger,
          socket activation). When false, the role only deploys config files.
      podman_nested_support:
        type: bool
        default: false
        description: >-
          Future: additional config for podman-in-podman guests.
          Not yet implemented — placeholder to establish the interface.
      podman_subuid_start:
        type: int
        default: 100000
        description: Starting subordinate UID value.
      podman_subuid_count:
        type: int
        default: 65536
        description: Number of subordinate UIDs and GIDs to allocate.
      podman_user_namespaces_max:
        type: int
        default: 28633
        description: Value for the user.max_user_namespaces sysctl.
      podman_unprivileged_port_start:
        type: int
        default: 0
        description: Value for the net.ipv4.ip_unprivileged_port_start sysctl.
      podman_docker_socket_symlink:
        type: bool
        default: true
        description: Create /var/run/docker.sock symlink to the podman user socket.
      podman_enable_linger:
        type: bool
        default: true
        description: Enable loginctl lingering so user systemd services persist across sessions.
      podman_configure_containers_conf:
        type: bool
        default: true
        description: Deploy a user-level containers.conf under ~/.config/containers/.
      podman_events_logger:
        type: str
        default: "file"
        description: >-
          Podman events logger backend. Set to "file" to avoid requiring
          journald access in rootless mode.
        choices:
          - file
          - journald
          - none
      podman_configure_storage_conf:
        type: bool
        default: true
        description: Deploy a user-level storage.conf under ~/.config/containers/.
      podman_storage_driver:
        type: str
        default: "overlay"
        description: Podman storage driver for user-level storage.conf.
      podman_storage_mount_program:
        type: str
        default: "/usr/bin/fuse-overlayfs"
        description: >-
          Path to fuse-overlayfs binary. Only used when
          podman_configure_storage_conf is true.
          Set to empty string to omit mount_program and use native overlay.
      podman_storage_graphroot:
        type: str
        default: ""
        description: >-
          Override the graphroot path for rootless storage.
          When set, the directory is created and graphroot is added to storage.conf.
          Leave empty to use the default (~/.local/share/containers/storage).
