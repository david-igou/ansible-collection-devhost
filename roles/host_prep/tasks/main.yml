---
- name: Create bind-mount target directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ host_prep_directories }}"

- name: Create seed gitconfig
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.gitconfig"
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Create seed claude.json
  ansible.builtin.copy:
    content: "{}"
    dest: "{{ ansible_facts.env.HOME }}/.claude.json"
    force: false
    mode: "0644"

- name: Set git user.name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ host_prep_git_user_name }}"
  when: host_prep_git_user_name | length > 0

- name: Set git user.email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ host_prep_git_user_email }}"
  when: host_prep_git_user_email | length > 0

- name: Configure GitHub SSH URL rewrite
  community.general.git_config:
    name: "url.git@github.com:.insteadOf"
    scope: global
    value: "https://github.com/"
  when: host_prep_git_github_ssh_rewrite

- name: Write 1Password service account token
  ansible.builtin.copy:
    content: "{{ host_prep_onepassword_service_account_token }}"
    dest: "{{ ansible_facts.env.HOME }}/.config/op/service-account-token"
    mode: "0600"
  when: host_prep_onepassword_service_account_token | length > 0

- name: Write SSH config
  ansible.builtin.copy:
    content: "{{ host_prep_ssh_config }}"
    dest: "{{ ansible_facts.env.HOME }}/.ssh/config"
    mode: "0600"
  when: host_prep_ssh_config | length > 0

- name: Write bashrc
  ansible.builtin.copy:
    content: "{{ host_prep_bashrc }}"
    dest: "{{ ansible_facts.env.HOME }}/.bashrc"
    mode: "0644"
  when: host_prep_bashrc | length > 0

- name: Clone devcontainer repository # noqa: latest[git] - user-specified repo, default branch intended
  ansible.builtin.git:
    repo: "{{ host_prep_devcontainer_repository }}"
    dest: "{{ ansible_facts.env.HOME }}/{{ host_prep_devcontainer_repository | basename | regex_replace('\\.git$', '') }}"
    update: false
  when: host_prep_devcontainer_repository | length > 0

- name: Clone workspace repositories # noqa: latest[git] - user-specified repos, default branch intended
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/workspace/{{ item | basename | regex_replace('\\.git$', '') }}"
    update: false
  loop: "{{ host_prep_workspace_repositories }}"
  when: host_prep_workspace_repositories | length > 0
