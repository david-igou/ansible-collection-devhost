---
- name: System-level podman configuration
  become: true
  block:
    - name: Set max user namespaces
      ansible.posix.sysctl:
        name: user.max_user_namespaces
        value: "{{ devhost_user_namespaces_max }}"
        sysctl_set: true
        state: present
        reload: true

    - name: Allow unprivileged port binding
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: "{{ devhost_unprivileged_port_start }}"
        sysctl_set: true
        state: present
        reload: true

    - name: Configure subuid for user
      ansible.builtin.command:
        cmd: "usermod --add-subuids {{ devhost_subuid_start }}-{{ devhost_subuid_start + devhost_subuid_count - 1 }} {{ ansible_user_id }}"
      register: _subuid_result
      changed_when: _subuid_result.rc == 0
      failed_when:
        - _subuid_result.rc != 0
        - "'already exists' not in (_subuid_result.stderr | default(''))"

    - name: Configure subgid for user
      ansible.builtin.command:
        cmd: "usermod --add-subgids {{ devhost_subuid_start }}-{{ devhost_subuid_start + devhost_subuid_count - 1 }} {{ ansible_user_id }}"
      register: _subgid_result
      changed_when: _subgid_result.rc == 0
      failed_when:
        - _subgid_result.rc != 0
        - "'already exists' not in (_subgid_result.stderr | default(''))"

    - name: Create docker.sock symlink to podman socket
      ansible.builtin.file:
        src: "/run/user/{{ ansible_user_uid }}/podman/podman.sock"
        dest: /var/run/docker.sock
        state: link
        force: true
      when: devhost_podman_socket_symlink

- name: Enable podman socket for user
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: user
  notify: Restart podman socket

- name: Check podman storage driver
  ansible.builtin.command:
    cmd: podman info --format '{{ '{{' }}.Store.GraphDriverName{{ '}}' }}'
  register: _podman_driver
  changed_when: false

- name: Warn if storage driver is not overlay
  ansible.builtin.debug:
    msg: "WARNING: Podman storage driver is '{{ _podman_driver.stdout }}', expected 'overlay'. Performance may be degraded."
  when: _podman_driver.stdout != 'overlay'
