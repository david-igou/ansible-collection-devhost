---
# Install and version-pin CLI tools with mise, using igou-devenv's mise.toml +
# mise.lock as the single source of truth (fetched from the igou-devenv repo at
# packages_mise_source_ref). GPG-pinned mise binary, system-wide /etc/mise config,
# `mise install`, then symlink every tool binary into /usr/local/bin (no shell
# activation). Versions are bumped in igou-devenv, not duplicated here.

- name: Map system architecture for mise
  ansible.builtin.set_fact:
    __packages_mise_arch: "{{ 'x64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}"

- name: Assemble the mise environment
  ansible.builtin.set_fact:
    __packages_mise_env:
      MISE_DATA_DIR: "{{ packages_mise_data_dir }}"
      MISE_GLOBAL_CONFIG_FILE: "{{ packages_mise_config_dir }}/mise.toml"
      MISE_TRUSTED_CONFIG_PATHS: "{{ packages_mise_config_dir }}/mise.toml"
      GITHUB_TOKEN: "{{ packages_github_token | default('', true) }}"
  no_log: true  # the dict carries GITHUB_TOKEN

- name: Ensure mise install prerequisites are present
  ansible.builtin.package:
    name: "{{ ['tar', 'gzip', 'curl'] + (['gnupg2'] if ansible_facts.os_family == 'RedHat' else ['gnupg']) }}"
    state: present
  become: true

- name: Check installed mise version
  ansible.builtin.command:
    cmd: mise --version
  register: __packages_mise_check
  changed_when: false
  failed_when: false

- name: Install the mise binary (GPG-pinned tarball) # noqa: command-instead-of-module -- GPG verify pipeline
  ansible.builtin.shell:
    executable: /usr/bin/bash
    cmd: |
      set -euo pipefail
      ver="{{ packages_mise_version }}"
      arch="{{ __packages_mise_arch }}"
      tarball="mise-${ver}-linux-${arch}.tar.gz"
      base="https://github.com/jdx/mise/releases/download/${ver}"
      work="$(mktemp -d)"; trap 'rm -rf "$work"' EXIT; cd "$work"
      export GNUPGHOME="${work}/gnupg"; mkdir -p -m 0700 "$GNUPGHOME"
      curl -fsSL -o key.asc "{{ packages_mise_gpg_url }}"
      gpg --batch --import key.asc
      gpg --list-keys --with-colons --with-fingerprint \
        | awk -F: '$1=="fpr"{print $10}' | grep -qFx "{{ packages_mise_gpg_fpr }}"
      curl -fsSL -o "$tarball" "${base}/${tarball}"
      curl -fsSL -o SHASUMS256.asc "${base}/SHASUMS256.asc"
      gpg --batch --status-fd 1 --verify SHASUMS256.asc 2>/dev/null | grep -qF "VALIDSIG {{ packages_mise_gpg_fpr }}"
      gpg --batch --decrypt SHASUMS256.asc 2>/dev/null | awk -v f="./${tarball}" '$2==f{print $1"  "f}' | sha256sum -c -
      tar -xz --strip-components=2 -C /usr/local/bin -f "$tarball" mise/bin/mise
      chmod +x /usr/local/bin/mise
  become: true
  changed_when: true
  when: (packages_mise_version | regex_replace('^v', '')) not in (__packages_mise_check.stdout | default(''))

- name: Ensure the mise config + hook directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ packages_mise_config_dir }}"
    - "{{ packages_mise_config_dir }}/aqua-registry"
  become: true

- name: Fetch igou-devenv mise.toml + mise.lock (single source of truth)
  ansible.builtin.get_url:
    url: "{{ packages_mise_source_base }}/{{ item }}"
    dest: "{{ packages_mise_config_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - mise.toml
    - mise.lock
  become: true

- name: Fetch igou-devenv aqua-registry GPG postinstall hooks
  ansible.builtin.get_url:
    url: "{{ packages_mise_source_base }}/aqua-registry/{{ item }}"
    dest: "{{ packages_mise_config_dir }}/aqua-registry/{{ item }}"
    mode: "0755"
  loop:
    - helm-postinstall.sh
    - terraform-postinstall.sh
    - oc-postinstall.sh
  become: true

- name: Trust the mise config
  ansible.builtin.command:
    cmd: /usr/local/bin/mise trust "{{ packages_mise_config_dir }}/mise.toml"
  environment: "{{ __packages_mise_env }}"
  changed_when: false
  become: true

- name: Install the pinned CLI tools with mise
  ansible.builtin.command:
    cmd: /usr/local/bin/mise install --yes
  environment: "{{ __packages_mise_env }}"
  register: __packages_mise_install
  changed_when: >-
    ('installed' in __packages_mise_install.stdout)
    or ('installed' in __packages_mise_install.stderr)
  become: true

- name: Symlink mise-managed binaries into /usr/local/bin # noqa: command-instead-of-shell -- pipe + per-binary symlink loop needs the shell
  ansible.builtin.shell:
    executable: /usr/bin/bash
    cmd: |
      set -euo pipefail
      /usr/local/bin/mise bin-paths | while IFS= read -r d; do
        find -L "$d" -maxdepth 1 -type f -executable -exec ln -sf {} /usr/local/bin/ \;
      done
  environment: "{{ __packages_mise_env }}"
  changed_when: false
  become: true
