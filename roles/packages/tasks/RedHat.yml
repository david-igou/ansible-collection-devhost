---
- name: Install core packages

  ansible.builtin.dnf:
    name:
      - podman
      - podman-docker
      - buildah
      - skopeo
      - fuse-overlayfs
      - slirp4netns
      - shadow-utils
      - catatonit
      - git
      - jq
      - make
      - curl
    state: present

- name: Install distro Node.js packages
  ansible.builtin.dnf:
    name:
      - nodejs
      - npm
    state: present
  when: not packages_install_nodejs_pinned

- name: Add 1Password yum repository

  ansible.builtin.yum_repository:
    name: 1password
    description: 1Password CLI
    baseurl: https://downloads.1password.com/linux/rpm/stable/$basearch
    gpgkey: https://downloads.1password.com/linux/keys/1password.asc
    gpgcheck: true
    enabled: true
  when: packages_install_onepassword

- name: Install 1Password CLI

  ansible.builtin.dnf:
    name: 1password-cli
    state: present
  when: packages_install_onepassword

- name: Add GitHub CLI yum repository

  ansible.builtin.yum_repository:
    name: github-cli
    description: GitHub CLI
    baseurl: https://cli.github.com/packages/rpm
    gpgkey: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x23F3D4EA75716059
    gpgcheck: true
    enabled: true
  when: packages_install_github_cli

- name: Install GitHub CLI

  ansible.builtin.dnf:
    name: gh
    state: present
  when: packages_install_github_cli

- name: Enable CRB repository
  ansible.builtin.command:
    cmd: dnf config-manager --set-enabled crb
  register: __packages_crb_result
  changed_when: __packages_crb_result.rc == 0
  when:
    - packages_install_extra_packages
    - ansible_facts.distribution != 'Fedora'

- name: Install EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when:
    - packages_install_extra_packages
    - ansible_facts.distribution != 'Fedora'

- name: Install Docker CE CLI
  when: packages_install_docker_cli
  vars:
    __packages_docker_distro: "{{ 'fedora' if ansible_facts.distribution == 'Fedora' else 'centos' }}"
  block:
    - name: Add Docker CE yum repository
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Stable
        baseurl: "https://download.docker.com/linux/{{ __packages_docker_distro }}/$releasever/$basearch/stable"
        gpgkey: "https://download.docker.com/linux/centos/gpg"
        gpgcheck: true
        enabled: true

    - name: Remove podman-docker to avoid conflict
      ansible.builtin.dnf:
        name: podman-docker
        state: absent

    - name: Install docker-ce-cli
      ansible.builtin.dnf:
        name: docker-ce-cli
        state: present

    - name: Install docker-compose-plugin
      ansible.builtin.dnf:
        name: docker-compose-plugin
        state: present
      when: packages_install_docker_compose_plugin

- name: Install extra packages
  ansible.builtin.dnf:
    name: "{{ packages_extra_packages_redhat }}"
    state: present
  when: packages_install_extra_packages
