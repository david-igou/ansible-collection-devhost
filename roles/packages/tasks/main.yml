---
- name: System package installation
  become: true
  block:
    - name: Include distro-specific package tasks
      ansible.builtin.include_tasks: "{{ ansible_facts.os_family }}.yml"

# CLI binaries (kubectl, helm, oc, ... + Node.js) are installed and version-pinned
# by mise from igou-devenv's fetched mise.toml. This is distro-agnostic — the same
# binaries on Debian and RedHat — so it replaces the per-tool get_url/unarchive tasks.
- name: Install CLI tools via mise
  ansible.builtin.include_tasks: mise.yml
  when: packages_install_cli_tools | bool

- name: Install pip packages
  ansible.builtin.pip:
    name: "{{ packages_pip_packages }}"
    # --ignore-installed: on PEP668/externally-managed distros (Debian) several deps
    # (e.g. pathspec) are apt-provided without pip RECORD files, so pip cannot
    # upgrade them; installing fresh avoids "Cannot uninstall ... RECORD not found".
    extra_args: --break-system-packages --ignore-installed
  become: true
  when:
    - packages_install_pip_packages
    - packages_pip_packages | length > 0

- name: Handle pip requirements file
  when:
    - packages_install_pip_packages
    - packages_pip_requirements | length > 0
  block:
    - name: Download remote pip requirements file
      ansible.builtin.get_url:
        url: "{{ packages_pip_requirements }}"
        dest: /tmp/pip-requirements.txt
        mode: "0644"
      when: packages_pip_requirements is match('https?://')

    - name: Install pip packages from requirements file
      ansible.builtin.pip:
        requirements: "{{ '/tmp/pip-requirements.txt' if packages_pip_requirements is match('https?://') else packages_pip_requirements }}"
        extra_args: --break-system-packages --ignore-installed
      become: true

- name: Configure npm prefix for user-level global installs
  ansible.builtin.command:
    cmd: npm config set prefix "{{ ansible_facts.env.HOME }}/.local"
    creates: "{{ ansible_facts.env.HOME }}/.npmrc"

- name: Install the devcontainer CLI globally via npm
  community.general.npm:
    name: "@devcontainers/cli"
    version: "{{ packages_devcontainer_cli_version }}"
    state: present
    global: true

- name: Install Claude Code # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  register: packages_claude_install_output # <- Registers the command output.
  changed_when: packages_claude_install_output.rc != 0 # <- Uses the return code to define when the task has changed.
  when: packages_install_claude_code

- name: Install Cursor agent CLI # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://cursor.com/install | bash
  register: packages_cursor_agent_install_output # <- Registers the command output.
  changed_when: packages_cursor_agent_install_output.rc != 0 # <- Uses the return code to define when the task has changed.
  when: packages_install_cursor_agent
