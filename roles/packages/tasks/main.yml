  ansible.builtin.get_url:
    url: "{{ __packages_virtctl_base }}/{{ packages_virtctl_version }}/virtctl-{{ packages_virtctl_version }}-linux-{{ __packages_arch }}"
    dest: /usr/local/bin/virtctl
    mode: "0755"
    force: true
  become: true
  when:
