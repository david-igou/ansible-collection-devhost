---
- name: System package installation
  become: true
  block:
    - name: Include distro-specific package tasks
      ansible.builtin.include_tasks: "{{ ansible_facts.os_family }}.yml"

- name: Install devcontainer CLI
  community.general.npm:
    name: "@devcontainers/cli"
    global: true
    version: "{{ packages_devcontainer_cli_version }}"

- name: Install Claude Code # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | sh
    creates: "{{ ansible_facts.env.HOME }}/.claude/local/bin/claude"
  when: packages_install_claude_code

- name: Install Cursor agent CLI # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://www.cursor.com/install-linux.sh | sh
    creates: "{{ ansible_facts.env.HOME }}/.cursor/bin/cursor-agent"
  when: packages_install_cursor_agent
