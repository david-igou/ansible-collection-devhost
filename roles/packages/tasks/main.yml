- name: Map system architecture to Node.js architecture
  ansible.builtin.set_fact:
    __packages_nodejs_arch: "{{ 'x64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}"
  when: packages_install_nodejs_pinned

- name: Check installed Node.js version
  ansible.builtin.command:
    cmd: node --version
  register: __packages_nodejs_check
  changed_when: false
  failed_when: false
  when: packages_install_nodejs_pinned

- name: Download Node.js tarball
  vars:
    __packages_nodejs_tarball: "node-{{ packages_nodejs_version }}-linux-{{ __packages_nodejs_arch }}.tar.xz"
  ansible.builtin.get_url:
    url: "https://nodejs.org/dist/{{ packages_nodejs_version }}/{{ __packages_nodejs_tarball }}"
    dest: "/tmp/{{ __packages_nodejs_tarball }}"
    mode: "0644"
  when:
    - packages_install_nodejs_pinned
    - (__packages_nodejs_check.stdout | default('')) != packages_nodejs_version

- name: Install Node.js
  vars:
    __packages_nodejs_tarball: "node-{{ packages_nodejs_version }}-linux-{{ __packages_nodejs_arch }}.tar.xz"
  ansible.builtin.unarchive:
    src: "/tmp/{{ __packages_nodejs_tarball }}"
    dest: /usr/local
    remote_src: true
    extra_opts:
      - --strip-components=1
  become: true
  when:
    - packages_install_nodejs_pinned
    - (__packages_nodejs_check.stdout | default('')) != packages_nodejs_version

- name: Configure npm prefix for user-level global installs
  ansible.builtin.command:
    cmd: npm config set prefix "{{ ansible_facts.env.HOME }}/.local"
    creates: "{{ ansible_facts.env.HOME }}/.npmrc"

- name: Set npm global prefix to user directory
  community.general.npm:
    name: "@devcontainers/cli"
    version: "{{ packages_devcontainer_cli_version }}"
    global: true

- name: Install Claude Code # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  register: packages_claude_install_output # <- Registers the command output.
  changed_when: packages_claude_install_output.rc != 0 # <- Uses the return code to define when the task has changed.
  when: packages_install_claude_code

- name: Install Cursor agent CLI # noqa: command-instead-of-module risky-shell-pipe
  ansible.builtin.shell:
    cmd: curl -fsSL https://cursor.com/install | bash
  register: packages_cursor_agent_install_output # <- Registers the command output.
  changed_when: packages_cursor_agent_install_output.rc != 0 # <- Uses the return code to define when the task has changed.
  when: packages_install_cursor_agent
