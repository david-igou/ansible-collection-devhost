---
argument_specs:
  main:
    short_description: Install system packages and CLI tools
    description:
      - Installs core packages (podman, git, jq, etc.) via distro package manager.
      - Configures optional third-party repositories (1Password, GitHub CLI, Docker CE).
      - Installs pinned versions of kubectl, helm, kustomize, virtctl, and Node.js.
      - Installs pip packages and npm-based CLI tools.
    options:
      packages_install_docker_cli:
        type: bool
        default: false
        description: >-
          Install Docker CE CLI from the official Docker repository.
          When true, podman-docker is removed to avoid a file conflict on /usr/bin/docker.
      packages_install_docker_compose_plugin:
        type: bool
        default: true
        description: >-
          Install the docker-compose-plugin alongside docker-ce-cli.
          Only effective when packages_install_docker_cli is true.
