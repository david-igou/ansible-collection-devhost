---
argument_specs:
  main:
    short_description: Install system packages and CLI tools
    description:
      - Installs core packages (git, jq, make, curl) via the distro package manager.
      - Configures optional third-party repositories (1Password, GitHub CLI).
      - Installs and version-pins CLI tools (kubectl, helm, oc, ... and Node.js) via mise from files/mise.toml.
      - Installs pip packages and the npm-based devcontainer CLI, and the Claude Code / Cursor agent CLIs.
    options:
      packages_install_cli_tools:
        type: bool
        default: true
        description: >-
          Install and version-pin the CLI tool set (kubectl, helm, kustomize, virtctl,
          argocd, flux, kubeseal, tkn, terraform, sops, oc, kubeconform, kube-burner,
          kube-burner-ocp, act, mc, rclone, and Node.js) via mise, using
          files/mise.toml as the source of truth. When false, a distro Node.js
          package is installed as a fallback so the devcontainer CLI still works.
      packages_install_onepassword:
        type: bool
        default: true
        description: >-
          Install the 1Password CLI from the official 1Password repository.
      packages_install_github_cli:
        type: bool
        default: true
        description: >-
          Install the GitHub CLI (gh) from the official GitHub repository.
      packages_install_claude_code:
        type: bool
        default: true
        description: >-
          Install the Claude Code CLI via the official install script.
      packages_install_cursor_agent:
        type: bool
        default: true
        description: >-
          Install the Cursor agent CLI via the official install script.
      packages_install_extra_packages:
        type: bool
        default: true
        description: >-
          Install the distro-specific extra package list.
      packages_install_pip_packages:
        type: bool
        default: true
        description: >-
          Install the pip packages listed in packages_pip_packages.
      packages_mise_version:
        type: str
        default: "v2026.6.11"
        description: >-
          Version of the mise binary to install (from a GPG-pinned tarball).
      packages_mise_gpg_fpr:
        type: str
        default: "24853EC9F655CE80B48E6C3A8B81C9D17413A06D"
        description: >-
          Pinned GPG fingerprint used to verify the mise release tarball.
      packages_mise_gpg_url:
        type: str
        default: "https://mise.jdx.dev/gpg-key.pub"
        description: >-
          URL of the mise release signing key.
      packages_mise_config_dir:
        type: str
        default: /etc/mise
        description: >-
          Directory the mise config, lockfile, and postinstall hooks are deployed to.
      packages_mise_data_dir:
        type: str
        default: /opt/mise
        description: >-
          Directory mise installs tool data into (MISE_DATA_DIR).
      packages_mise_source_repo:
        type: str
        default: "igou-io/igou-devenv"
        description: >-
          GitHub repo providing the mise.toml/mise.lock/aqua-registry source of truth.
      packages_mise_source_ref:
        type: str
        default: "v2026.06.29"
        description: >-
          Git ref (tag/branch/SHA) of packages_mise_source_repo to fetch the mise config + lock from.
      packages_mise_source_base:
        type: str
        description: >-
          Raw base URL the mise.toml/mise.lock/hooks are fetched from (derived from
          packages_mise_source_repo + packages_mise_source_ref).
      packages_github_token:
        type: str
        required: false
        default: ""
        no_log: true
        description: >-
          GitHub token used by `mise install` to raise the GitHub API rate limit.
          Defaults to the GITHUB_TOKEN environment variable.
      packages_devcontainer_cli_version:
        type: str
        default: "0.85.0"
        description: >-
          Version of the @devcontainers/cli npm package to install.
      packages_pip_packages:
        type: list
        elements: str
        description: >-
          Pip packages (with pinned versions) to install.
      packages_pip_requirements:
        type: str
        default: ""
        description: >-
          Path or URL to a pip requirements file (skipped when empty).
      packages_extra_packages_debian:
        type: list
        elements: str
        description: >-
          Extra apt packages to install on Debian/Ubuntu.
      packages_extra_packages_redhat:
        type: list
        elements: str
        description: >-
          Extra dnf packages to install on RHEL/CentOS.
