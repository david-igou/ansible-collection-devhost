---
argument_specs:
  main:
    short_description: Install and manage Docker CE
    description:
      - Sets up the Docker CE repository for the target distro.
      - Installs docker-ce-cli and docker-compose-plugin.
      - Removes podman-docker to avoid file conflicts on /usr/bin/docker.
      - Optionally installs the Docker daemon (docker-ce, containerd.io).
      - Deploys /etc/docker/daemon.json with configurable options.
      - Manages docker group membership for socket access.
      - Enables and starts docker.service.
      - Optionally configures rootless Docker for the target user.
    options:
      docker_enabled:
        type: bool
        default: true
        description: >-
          Gate for all role tasks. Set to false to include the role
          without executing any tasks.
      docker_install_cli:
        type: bool
        default: true
        description: >-
          Install the docker-ce-cli package from the Docker CE repository.
      docker_install_compose_plugin:
        type: bool
        default: true
        description: >-
          Install the docker-compose-plugin package alongside docker-ce-cli.
      docker_install_daemon:
        type: bool
        default: true
        description: >-
          Install docker-ce and containerd.io, deploy daemon.json,
          manage the docker group, and enable docker.service.
          Set to false for a CLI-only installation.
      docker_rootless:
        type: bool
        default: false
        description: >-
          Install docker-ce-rootless-extras and configure rootless Docker
          for the target user. Adds a user-scoped docker.service unit.
      docker_storage_driver:
        type: str
        default: "overlay2"
        description: Storage driver for the Docker daemon (daemon.json storage-driver).
      docker_log_driver:
        type: str
        default: "journald"
        description: Default logging driver for containers (daemon.json log-driver).
      docker_live_restore:
        type: bool
        default: true
        description: >-
          Enable live restore so running containers persist across daemon restarts.
      docker_registry_mirrors:
        type: list
        elements: str
        default: []
        description: >-
          List of registry mirror URLs. Included in daemon.json only when non-empty.
      docker_insecure_registries:
        type: list
        elements: str
        default: []
        description: >-
          List of insecure registries. Included in daemon.json only when non-empty.
      docker_daemon_options:
        type: dict
        default: {}
        description: >-
          Arbitrary additional keys merged into daemon.json.
          These take precedence over the standard keys.
      docker_group_members:
        type: list
        elements: str
        description: >-
          List of users to add to the docker group for socket access.
          Defaults to the current Ansible user.
