---
ancestor: null
releases:
  27.0.0:
    changes:
      breaking_changes:
        - "Podman and Docker CE package installation moved out of the ``packages``\
          \ role into the ``podman`` and ``docker`` roles respectively. The following\
          \ variables have been renamed: ``packages_install_podman_docker`` \u2192\
          \ ``podman_docker_compat``, ``packages_install_docker_cli`` \u2192 ``docker_install_cli``,\
          \ ``packages_install_docker_compose_plugin`` \u2192 ``docker_install_compose_plugin``\
          \ (https://github.com/david-igou/ansible-collection-devhost/issues/22)."
        - packages role - The 17 per-tool ``packages_install_*`` flags and ``packages_*_version``
          vars (and ``packages_install_nodejs_pinned`` / ``packages_nodejs_version``)
          are removed; CLI tools are now gated by the single ``packages_install_cli_tools``
          flag and versioned via the fetched igou-devenv ``mise.toml``. A ``GITHUB_TOKEN``
          (via ``packages_github_token`` or the environment) is recommended for ``mise
          install`` to avoid GitHub API rate limits.
        - packages role - When ``packages_install_cli_tools`` is enabled, the GitHub
          CLI (``gh``) is now provided by mise, so the distro ``gh`` package is no
          longer installed even when ``packages_install_github_cli`` is true. The
          distro ``gh`` is only installed as a fallback when the mise tool set is
          disabled.
      major_changes:
        - The ``docker`` role now manages the full Docker CE lifecycle including repository
          setup, CLI installation, compose plugin, daemon, and rootless mode. It no
          longer depends on the ``packages`` role (https://github.com/david-igou/ansible-collection-devhost/issues/22).
        - The ``podman`` role now installs its own packages (podman, buildah, skopeo,
          fuse-overlayfs, slirp4netns, uidmap/shadow-utils, catatonit) and no longer
          depends on the ``packages`` role (https://github.com/david-igou/ansible-collection-devhost/issues/22).
      minor_changes:
        - 'packages role - Add 13 binary CLI tool downloads: argocd, flux, kubeseal,
          tkn, terraform, sops, oc, kubeconform, kube-burner, kube-burner-ocp, act,
          mc, and rclone. Each tool is gated behind a ``packages_install_*`` flag
          and version-pinned in ``defaults/main.yml`` (https://github.com/david-igou/ansible-collection-devhost/issues/7).'
        - packages role - CLI tools (kubectl, helm, kustomize, virtctl, argocd, flux,
          kubeseal, tkn, terraform, sops, oc, kubeconform, kube-burner, kube-burner-ocp,
          act, rclone, and Node.js) are now installed and version-pinned via ``mise``
          instead of per-tool ``get_url``/``unarchive`` tasks. The tool set (``mise.toml``
          + the committed ``mise.lock`` + the GPG postinstall hooks) is fetched from
          the igou-devenv repo (``packages_mise_source_repo`` / ``packages_mise_source_ref``,
          pinned to an immutable commit SHA) as the single source of truth, so versions
          are maintained in one place. mise itself is installed from a GPG-pinned
          tarball and the tool binaries are symlinked into /usr/local/bin. Distro-agnostic
          (the same binaries on Debian and RedHat) (https://github.com/david-igou/ansible-collection-devhost/issues/24).
    fragments:
      - 22-refactor-container-runtimes.yml
      - 24-mise-cli-tools.yml
      - 7-binary-cli-tools.yml
    release_date: '2026-07-02'
  27.1.0:
    changes:
      minor_changes:
        - "New ``ghapp`` role \u2014 installs the ghapp CLI / git credential helper\
          \ (runtime-minted, single-repo, permission-scoped GitHub App tokens) into\
          \ a dedicated virtualenv, and optionally configures either local-mint client\
          \ mode (per-user config + gitconfig credential helper) or a hardened systemd\
          \ token-broker service that owns the App private key as a dedicated system\
          \ user and serves policy-clamped tokens over a unix socket for containerized\
          \ agents."
    fragments:
      - ghapp-role.yml
    release_date: '2026-07-02'
  27.1.1:
    changes:
      bugfixes:
        - "ghapp broker unit \u2014 add ``SupplementaryGroups={{ ghapp_broker_group\
          \ }}``: ``Group=`` (the socket-access group) replaces the primary gid, which\
          \ cost the broker its group-read on the config/policy files and crash-looped\
          \ the service whenever the socket group differed from the broker group (the\
          \ Hermes wiring). Found live in the kubevirt e2e scenario."
    fragments:
      - broker-supplementary-groups.yml
    release_date: '2026-07-02'
  27.1.2:
    changes:
      minor_changes:
        - "ghapp broker \u2014 optional SELinux confinement (``ghapp_broker_selinux_confine``,\
          \ default true). On SELinux-enabled hosts the role builds and loads a policy\
          \ module running the broker in a dedicated ``ghbroker_t`` domain with a\
          \ dedicated socket type, so a confined agent container may connect to the\
          \ broker socket via a narrowly scoped ``connectto``/``sock_file`` grant\
          \ instead of disabling the container label or granting connect to a broad\
          \ host type. Validated enforcing on CentOS Stream 10 via the igou-ansible\
          \ kubevirt e2e."
    fragments:
      - broker-selinux.yml
    release_date: '2026-07-02'
