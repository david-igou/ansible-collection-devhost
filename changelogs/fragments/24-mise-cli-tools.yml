---
minor_changes:
  - >-
    packages role - Install and version-pin CLI tools (kubectl, helm, kustomize,
    virtctl, argocd, flux, kubeseal, tkn, terraform, sops, oc, kubeconform,
    kube-burner, kube-burner-ocp, act, mc, rclone, and Node.js) via ``mise``
    instead of per-tool ``get_url``/``unarchive`` tasks. Tool versions live in
    ``roles/packages/files/mise.toml`` (the single source of truth, Renovate-
    managed via the native mise manager) with a committed ``mise.lock``, SLSA/
    attestation verification, and GPG postinstall hooks for helm/terraform/oc.
    This is distro-agnostic (the same binaries on Debian and RedHat)
    (https://github.com/david-igou/ansible-collection-devhost/issues/24).
breaking_changes:
  - >-
    packages role - The 17 per-tool ``packages_install_*`` flags and
    ``packages_*_version`` vars (and ``packages_install_nodejs_pinned`` /
    ``packages_nodejs_version``) are removed; the CLI tools are now gated by the
    single ``packages_install_cli_tools`` flag and versioned in
    ``roles/packages/files/mise.toml``. A ``GITHUB_TOKEN`` (via
    ``packages_github_token`` or the environment) is recommended for
    ``mise install`` to avoid GitHub API rate limits.
