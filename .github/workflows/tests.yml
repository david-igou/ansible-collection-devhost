---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@11fc6c1c1a2421cac44cc5c40b6f72656745f1f9 # main
    if: github.event_name == 'pull_request'
  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@11fc6c1c1a2421cac44cc5c40b6f72656745f1f9 # main
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@11fc6c1c1a2421cac44cc5c40b6f72656745f1f9 # main
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@11fc6c1c1a2421cac44cc5c40b6f72656745f1f9 # main
  molecule:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # only needs to read the repo; GITHUB_TOKEN is for release-API rate limits
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - host_prep
          - packages
          - docker
          - podman
          - ghapp
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule

      - name: Smoke test molecule ${{ matrix.scenario }}
        run: molecule test -s ${{ matrix.scenario }}
        env:
          # mise install fetches many GitHub releases; the token raises the
          # anonymous 60/hr API limit so the packages scenario doesn't rate-limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  all_green:
    if: ${{ always() }}
    needs:
      - changelog
      - build-import
      - sanity
      - ansible-lint
      - molecule
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert 'failure' not in
          set([
          '${{ needs.changelog.result }}',
          '${{ needs.build-import.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.ansible-lint.result }}',
          '${{ needs.molecule.result }}',
          ])"
